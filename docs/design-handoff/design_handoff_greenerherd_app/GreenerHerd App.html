<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GreenerHerd · Livestock management</title>
<link rel="stylesheet" href="styles/tokens.css">
<style>
  html, body { margin: 0; padding: 0; background: #D9E4C8; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }
  /* Hide native focus rings everywhere; keep keyboard a11y via hover */
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid rgba(59, 90, 42, 0.35); outline-offset: 1px;
  }
  button { font-family: inherit; }
  input, select { font-family: inherit; -webkit-appearance: none; appearance: none; }
  /* Animations for sheet + recording pulse */
  @keyframes gh-fade  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes gh-slide { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes gh-slide-down { from { transform: translateY(-100%); } to { transform: translateY(0); } }
  @keyframes gh-pulse { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(1.4); opacity: 0; } }
  /* Scrollbar polish inside frame */
  *::-webkit-scrollbar { width: 0; height: 0; }
</style>
