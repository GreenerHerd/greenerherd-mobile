name: greenerherd_mobile
description: GreenerHerd livestock management mobile app.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.7.0
  intl: ^0.20.2
  flutter_svg: ^2.0.17
  fl_chart: ^0.69.2
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.0
  uuid: ^4.5.1
  equatable: ^2.0.7
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  test: ^1.25.7
  flutter_lints: ^4.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/design/
    - assets/design/icons/
    - assets/design/species/
    - assets/fixtures/
    - assets/data/breeds.json
    - assets/data/feed_products.json
    - assets/data/medicine_products.json
    - assets/data/marketplace_feed_products.json
    - assets/data/nutrition_requirements.json
    - assets/data/nutrition_bdd_scenarios.json
    - assets/data/feed_indicative_prices.json
    - assets/data/notification_task_definitions.json
    - assets/data/group_nutrition/
    - assets/data/group_nutrition_profiles.json
